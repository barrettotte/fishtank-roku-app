name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Inject version into manifest
        run: |
          VERSION=$(node -p "require('./package.json').version")
          sed -i "s/major_version=.*/major_version=$(echo $VERSION | cut -d. -f1)/" out/staging/manifest
          sed -i "s/minor_version=.*/minor_version=$(echo $VERSION | cut -d. -f2)/" out/staging/manifest
          sed -i "s/build_version=.*/build_version=$(echo $VERSION | cut -d. -f3)/" out/staging/manifest
          echo "app_version=$VERSION" >> out/staging/manifest
          cd out/staging && zip -r ../fishtank-roku-app.zip . -x "*.map"

      - name: Upload build artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: fishtank-roku-app
          path: out/fishtank-roku-app.zip
